<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Football Tactical Planner</title>

<script src="html2canvas.min.js"></script>

<style>
body{
  margin:0;
  background:#1b1b1b;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#controls{
  position:absolute;
  top:20px;
}

button{
  padding:8px 16px;
  font-size:15px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

#field{
  position:relative;
  width:900px;
  height:500px;
  background:url("field.jpg") no-repeat center;
  background-size:contain;
  border:3px solid white;
}

.player{
  position:absolute;
  width:42px;
  height:42px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  color:white;
  border:3px solid white;
  transform:translate(-50%,-50%);
  cursor:grab;
  user-select:none;
  transition: box-shadow 0.2s ease;
}

.home{ background:#e53935; }
.away{ background:#1e88e5; }

.selected{
  box-shadow:
    0 0 0 4px #ffffff,
    0 0 14px 6px #ffeb3b,
    0 0 28px 12px rgba(255,235,59,0.7);
  animation: pulseGlow 1.1s infinite alternate;
}

@keyframes pulseGlow{
  from{
    box-shadow:
      0 0 0 4px #ffffff,
      0 0 8px 4px #ffeb3b,
      0 0 20px 8px rgba(255,235,59,0.5);
  }
  to{
    box-shadow:
      0 0 0 4px #ffffff,
      0 0 18px 8px #ffeb3b,
      0 0 34px 14px rgba(255,235,59,0.8);
  }
}

svg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}
</style>
</head>
<body>

<div id="controls">
  <button id="exportBtn">📸 Export PNG</button>
</div>

<div id="field">
  <svg id="arrowLayer"></svg>
</div>

<script>
const field = document.getElementById("field");
const arrowLayer = document.getElementById("arrowLayer");
const exportBtn = document.getElementById("exportBtn");

let selectedPlayer = null;

/* EXPORT WITH PLAN NAME */
exportBtn.onclick = async () => {

  let planName = prompt("Enter Play Name:");

  if(planName === null) return;

  planName = planName.trim().replace(/[\\/:*?"<>|]/g, "");

  if(planName === "") planName = "formation";

  const canvas = await html2canvas(field, { scale:3 });

  const link = document.createElement("a");
  link.download = planName + ".png";
  link.href = canvas.toDataURL();
  link.click();
};

/* CREATE PLAYER */
function createPlayer(id, team, nx, ny){
  const p = document.createElement("div");
  p.className = "player " + team;
  p.innerText = id;

  p.dataset.nx = nx;
  p.dataset.ny = ny;

  field.appendChild(p);
  positionPlayer(p);

  let dragging=false;
  let moved=false;

  p.addEventListener("mousedown", ()=>{
    dragging=true;
    moved=false;
  });

  document.addEventListener("mouseup", ()=> dragging=false);

  document.addEventListener("mousemove", e=>{
    if(!dragging) return;

    moved=true;

    const rect=field.getBoundingClientRect();
    let x=e.clientX-rect.left;
    let y=e.clientY-rect.top;

    x=Math.max(0,Math.min(rect.width,x));
    y=Math.max(0,Math.min(rect.height,y));

    p.dataset.nx=x/rect.width;
    p.dataset.ny=y/rect.height;

    positionPlayer(p);
  });

  p.addEventListener("click", ()=>{

    if(moved) return;

    if(!selectedPlayer){
      selectedPlayer=p;
      p.classList.add("selected");
      return;
    }

    if(selectedPlayer===p){
      selectedPlayer.classList.remove("selected");
      selectedPlayer=null;
      return;
    }

    drawArrow(selectedPlayer,p);
    selectedPlayer.classList.remove("selected");
    selectedPlayer=null;
  });
}

function positionPlayer(p){
  const rect=field.getBoundingClientRect();
  p.style.left=p.dataset.nx*rect.width+"px";
  p.style.top=p.dataset.ny*rect.height+"px";
}

function drawArrow(p1,p2){
  const r=field.getBoundingClientRect();

  const x1=p1.dataset.nx*r.width;
  const y1=p1.dataset.ny*r.height;
  const x2=p2.dataset.nx*r.width;
  const y2=p2.dataset.ny*r.height;

  const line=document.createElementNS("http://www.w3.org/2000/svg","line");
  line.setAttribute("x1",x1);
  line.setAttribute("y1",y1);
  line.setAttribute("x2",x2);
  line.setAttribute("y2",y2);
  line.setAttribute("stroke","yellow");
  line.setAttribute("stroke-width","4");
  line.setAttribute("marker-end","url(#arrowhead)");

  const hit=document.createElementNS("http://www.w3.org/2000/svg","line");
  hit.setAttribute("x1",x1);
  hit.setAttribute("y1",y1);
  hit.setAttribute("x2",x2);
  hit.setAttribute("y2",y2);
  hit.setAttribute("stroke","transparent");
  hit.setAttribute("stroke-width","22");
  hit.style.cursor="pointer";

  hit.addEventListener("click",()=>{
    line.remove();
    hit.remove();
  });

  arrowLayer.appendChild(hit);
  arrowLayer.appendChild(line);
}

/* arrow head */
const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");
defs.innerHTML=`
<marker id="arrowhead" markerWidth="10" markerHeight="7"
 refX="10" refY="3.5" orient="auto">
 <polygon points="0 0, 10 3.5, 0 7" fill="yellow"/>
</marker>`;
arrowLayer.appendChild(defs);

/* PLACE PLAYERS LEFT & RIGHT */
function placePlayersBottomSides(){
  const bottomY=0.92;
  const leftStart=0.06;
  const rightStart=0.56;
  const spacing=0.04;

  for(let i=0;i<11;i++)
    createPlayer(i+1,"home",leftStart+i*spacing,bottomY);

  for(let i=0;i<11;i++)
    createPlayer(i+1,"away",rightStart+i*spacing,bottomY);
}

placePlayersBottomSides();

window.addEventListener("resize", ()=>{
  document.querySelectorAll(".player").forEach(positionPlayer);
});
</script>
</body>
</html>
